<div class="auth-page">

  <div class="brand-header">
    <div class="brand-icon">♪</div>
    <span class="brand-name">SoundScape</span>
  </div>

  <mat-card class="auth-card">

    <mat-card-header>
      <mat-card-title>Connect Spotify</mat-card-title>
      <mat-card-subtitle>Link your account to get started</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <p class="spotify-desc">
        SoundScape uses Spotify to power your music experience.
        Connect your Spotify account to share your music with others.
      </p>
      <button mat-flat-button type="button" class="auth-primary-btn" (click)="spotifySetup()">
        Connect to Spotify
      </button>
    </mat-card-content>

    <mat-divider class="auth-divider"></mat-divider>

    <mat-card-actions class="auth-footer">
      <span class="auth-footer-text">Changed your mind?</span>
      <button mat-button class="auth-footer-link cancel-link" (click)="cancel()">Cancel registration</button>
    </mat-card-actions>

  </mat-card>

</div>
