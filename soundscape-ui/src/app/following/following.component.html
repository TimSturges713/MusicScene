<h2>Following:</h2>
<ul>
    <div *ngIf="!indicator">
        <li *ngFor="let account of following">{{account}} <button (click)="unfollow(account)">Unfollow</button></li>
    </div>
    <div *ngIf="indicator">
        <li *ngFor="let account of following">{{account}}</li>
    </div>
</ul>
<button (click)="back()">Back</button>
