<div class="content-page">
  <div class="page-inner">

    <div class="page-header">
      <button mat-button class="btn-back" (click)="back()">← Back</button>
      <h1 class="page-title">Search</h1>
    </div>

    <div class="search-bar dark-form">
      <mat-form-field appearance="outline" class="search-field">

      <button mat-flat-button class="btn-primary search-btn" (click)="search()">Search</button>
    </div>

  </div>
</div>
