<div class="auth-page">

  <div class="brand-header">
    <div class="brand-icon">♪</div>
    <span class="brand-name">SoundScape</span>
  </div>

  <mat-card class="auth-card">

    <mat-card-header>
      <mat-card-title>Welcome back</mat-card-title>
      <mat-card-subtitle>Sign in to continue listening</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form class="auth-form">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput type="text" id="username" autocomplete="username">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" id="password" autocomplete="current-password">
        </mat-form-field>

        <button mat-flat-button type="button" class="auth-primary-btn" (click)="login()">
          Sign In
        </button>

      </form>
    </mat-card-content>

    <mat-divider class="auth-divider"></mat-divider>

    <mat-card-actions class="auth-footer">
      <span class="auth-footer-text">Don't have an account?</span>
      <button mat-button class="auth-footer-link" (click)="register()">Create one</button>
    </mat-card-actions>

  </mat-card>

</div>
