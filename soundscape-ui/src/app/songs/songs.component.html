<div class="content-page">
  <div class="page-inner">

    <div class="page-header">
      <button mat-button class="btn-back" (click)="back()">← Back</button>
      <h1 class="page-title">Albums</h1>
    </div>

    <div class="album-list">
      <p *ngIf="loading">Loading...</p>
      <button mat-button class="album-btn"
        *ngFor="let album of albumTracks | keyvalue: originalOrder"
        (click)="getTracks(album.value)">
        <span class="album-note">♫</span>
        <span>{{ album.key }}</span>
      </button>
    </div>

  </div>
</div>
